version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# NawaQare — Docker Compose PRODUCTION
# Serveur : 54.219.14.133
#
# Architecture :
#   Nginx (port 80/443)
#     ├── /api/v1/*  → NestJS NawaQare Backend  (port 3000)
#     └── /api/*     → Ancien backend Express    (port 5000, déjà sur le serveur)
#
# Avant de lancer : copier .env.example → .env et remplir toutes les valeurs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nawaqare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nawaqare_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nawaqare_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - nawaqare_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (stockage documents) ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nawaqare_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - nawaqare_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: nawaqare_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - nawaqare_net
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/nawaqare-documents;
        mc anonymous set download local/nawaqare-documents/public;
        echo 'MinIO bucket OK';
      "

  # ─── NestJS API NawaQare ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nawaqare_api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - nawaqare_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ─── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nawaqare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      # Nécessaire sur Linux (Docker Engine) pour joindre l'ancien Express sur l'hôte :5000
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - nawaqare_net
      - host_net

  # ─── Migration + Seed (s'exécute une seule fois au démarrage) ───────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nawaqare_migrate
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: >
      sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nawaqare_net
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  nawaqare_net:
    driver: bridge
  host_net:
    external: true
    name: bridge
