version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nawaqare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nawaqare
      POSTGRES_PASSWORD: nawaqare_secret
      POSTGRES_DB: nawaqare_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nawaqare -d nawaqare_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nawaqare_redis
    restart: unless-stopped
    command: redis-server --requirepass nawaqare_redis_secret --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "nawaqare_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible object storage) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nawaqare_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nawaqare_minio
      MINIO_ROOT_PASSWORD: nawaqare_minio_secret
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console Web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── MinIO setup (création du bucket au démarrage) ────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: nawaqare_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 nawaqare_minio nawaqare_minio_secret;
        mc mb --ignore-existing local/nawaqare-documents;
        mc anonymous set download local/nawaqare-documents/public;
        echo 'MinIO bucket ready';
      "

  # ─── NawaQare API (optionnel — à activer pour prod Docker) ────────────────
  # api:
  #   build: .
  #   container_name: nawaqare_api
  #   restart: unless-stopped
  #   env_file: .env
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
