worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Timeouts pour WebSocket / téléconsultation
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    proxy_connect_timeout 10s;

    # ─── Taille max upload (documents médicaux) ───────────────────────────────
    client_max_body_size 20M;

    upstream nestjs_api {
        server api:3000;
    }

    # ─── Ancien backend Express (déjà déployé sur le serveur, port 5000) ──────
    # Adapter le port si différent
    upstream legacy_api {
        server host.docker.internal:5000;
    }

    server {
        listen 80;
        server_name 54.219.14.133;

        # ─── NestJS : nouvelles routes /api/v1/* ──────────────────────────────
        location /api/v1/ {
            proxy_pass         http://nestjs_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── WebSocket Socket.IO (téléconsultation) ───────────────────────────
        location /socket.io/ {
            proxy_pass         http://nestjs_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }

        # ─── Ancien backend Express : toutes les autres routes /api/* ─────────
        location /api/ {
            proxy_pass         http://legacy_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ─── MinIO : accès documents (lecture publique) ───────────────────────
        location /documents/ {
            proxy_pass http://minio:9000/nawaqare-documents/;
            proxy_set_header Host $host;
        }

        # ─── Health check global ──────────────────────────────────────────────
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
